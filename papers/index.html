<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Papers & Preprints – Jacob Monzel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: "Times New Roman", Times, serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem;
      color: #000;
      background-color: #fff;
      line-height: 1.5;
    }

    nav {
      margin-bottom: 2rem;
      font-size: 1.1rem;
      text-align: center; 
      background-color: #f0f0f0;
      padding: 0.5rem;
      border: 1px solid #ccc;
    }

    nav a {
      margin: 0 1rem;
      text-decoration: none;
      color: #0000EE;
    }

    nav a:hover {
      text-decoration: underline;
    }

    h1 {
      text-align: center;
      font-size: 2.2rem;
      margin-bottom: 1rem;
      font-weight: bold;
    }

    p {
      text-align: justify;
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }

    .paper-section {
      border: 1px solid #808080;
      margin-bottom: 2rem;
    }

    .section-header {
      background-color: #fff;
      border-bottom: 1px solid #808080;
      padding: 8px;
      text-align: center;
      font-weight: bold;
      font-size: 1.2rem;
      letter-spacing: 0.5px;
    }

    .paper-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .paper-item {
      padding: 15px;
      border-bottom: 1px solid #e0e0e0;
    }

    .paper-item:last-child {
      border-bottom: none;
    }

    .paper-title {
      font-weight: bold;
      font-size: 1.15rem;
      color: #000;
    }
    
    .paper-authors {
      margin-top: 4px;
      font-style: italic;
    }

    .paper-info {
      margin-top: 4px;
      color: #444;
    }

    a {
      color: #0000EE;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    
    .pdf-link {
      font-weight: bold;
      margin-left: 5px;
    }
  </style>
</head>
<body>

  <nav>
    <a href="/">Home</a>
  </nav>

  <main>
    <h1>Papers &amp; Preprints</h1>
    <p>
      Below are my publications and preprints.
    </p>

    <div class="paper-section">
      <div class="section-header">Preprints</div>
      <ul class="paper-list">
        
        <li class="paper-item">
          <div class="paper-title">
            <a href="#">Title of a Future Paper...Hopefully </a>
          </div>
          <div class="paper-authors">
            with Co-Author Name would go here
          </div>
          <div class="paper-info">
            Submitted (2026). <a href="#" class="pdf-link">[PDF]</a> <a href="#" class="pdf-link">[arXiv]</a>
          </div>
        </li>

      </ul>
    </div>

    <div class="paper-section">
      <div class="section-header">Publications</div>
      <ul class="paper-list">

        <li class="paper-item">
           <div class="paper-info" style="font-style: italic; color: #666;">
             (None yet)
           </div>
        </li>

      </ul>
    </div>

  </main>
</body>
</html>
